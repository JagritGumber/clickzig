name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Tag-gated release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      # Release gate: tests must pass at the tagged commit. If this
      # fails the GitHub Release is not created and the tag is left
      # without a release artifact (a visible signal something is wrong).
      - name: Test gate
        run: zig build test --summary all

      - name: Examples compile gate
        run: zig build examples --summary all

      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          {
            echo "## clickzig ${TAG}"
            echo
            if [ -n "$PREV_TAG" ]; then
              echo "### Changes since ${PREV_TAG}"
              echo
              git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${TAG}"
            else
              echo "### Initial tagged release"
              echo
              git log --pretty=format:"- %s (%h)" "${TAG}"
            fi
            echo
            echo
            echo "### Install"
            echo
            echo '```zig'
            echo '.dependencies = .{'
            echo '    .clickzig = .{'
            echo "        .url = \"https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz\","
            echo '    },'
            echo '},'
            echo '```'
          } > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
