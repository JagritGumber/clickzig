name: CI

on:
  push:
    branches: [main, 0.16.0]
  pull_request:
    branches: [main, 0.16.0]

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: zig build test
        run: zig build test --summary all
      - name: zig build audit
        run: zig build audit --summary all
      - name: zig build examples (compile-only)
        run: zig build examples --summary all

  smoke:
    name: Smoke against real ClickHouse
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:26.3
        ports:
          - 9000:9000
          - 8123:8123
        env:
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
          CLICKHOUSE_PASSWORD: test
        options: >-
          --health-cmd "wget --quiet --tries=1 --spider http://localhost:8123/ping || exit 1"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Wait for ClickHouse
        run: |
          for i in $(seq 1 30); do
            if curl -sf -u default:test "http://localhost:8123/?query=SELECT+1" > /dev/null; then
              echo "ClickHouse is up"
              exit 0
            fi
            sleep 1
          done
          echo "ClickHouse failed to start"
          exit 1
      - name: smoke happy
        run: zig build smoke -- happy
      - name: smoke ping
        run: zig build smoke -- ping
      - name: smoke wrong-pass
        run: zig build smoke -- wrong-pass
      - name: smoke unreachable
        run: zig build smoke -- unreachable
      - name: smoke wrong-host
        run: zig build smoke -- wrong-host
      - name: smoke query-bytes
        run: zig build smoke -- query-bytes
      - name: smoke query-mixed
        run: zig build smoke -- query-mixed
      - name: smoke insert-roundtrip
        run: zig build smoke -- insert-roundtrip
      - name: smoke nullable-roundtrip
        run: zig build smoke -- nullable-roundtrip
      - name: smoke complex-types
        run: zig build smoke -- complex-types
      - name: smoke pool
        run: zig build smoke -- pool
      - name: smoke pool-loop
        run: zig build smoke -- pool-loop
      - name: smoke dsn
        run: zig build smoke -- dsn
      - name: smoke decimal-ip
        run: zig build smoke -- decimal-ip
      - name: smoke tuple-map
        run: zig build smoke -- tuple-map
      - name: smoke compression aggregate
        run: zig build smoke-compression
      - name: smoke insert-zstd
        run: zig build smoke -- insert-zstd
      - name: smoke nested compressed insert
        run: zig build smoke -- nested-compressed-insert
      - name: smoke timeout
        run: zig build smoke -- timeout
      - name: smoke read-timeout
        run: zig build smoke -- read-timeout
      - name: smoke write-timeout
        run: zig build smoke -- write-timeout
      - name: smoke parameters
        run: zig build smoke -- parameters
      - name: smoke geo
        run: zig build smoke -- geo
      - name: smoke external-data
        run: zig build smoke -- external-data
      - name: smoke combined features
        run: zig build smoke -- combined-features
      - name: smoke column coverage
        run: zig build smoke -- column-coverage
      - name: smoke lowcardinality
        run: zig build smoke -- lowcardinality
      - name: smoke lc-write
        run: zig build smoke -- lc-write
      - name: branch-readiness smoke aggregate
        run: zig build smoke-readiness
